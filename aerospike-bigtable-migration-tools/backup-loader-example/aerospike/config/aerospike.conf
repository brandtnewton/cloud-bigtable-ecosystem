# Aerospike database configuration file
# This template sets up a single-node, single namespace developer environment.
#
# Alternatively, you can pass in your own configuration file.
# You can see more examples at
# https://github.com/aerospike/aerospike-server/tree/master/as/etc

service {
        cluster-name docker
}

logging {
        console {
                context any info
        }
}

network {
        service {
                address any
                port 3000
        }

        heartbeat {
                mode mesh
                address local
                port 3002
                interval 150
                timeout 10
        }

        fabric {
                address local
                port 3001
        }
}

namespace animals {
        replication-factor 1
        default-ttl 0
        nsup-period 120

        storage-engine device {
                file /opt/aerospike/data/test-ani.dat
                filesize 4G
                read-page-cache true
        }
}

namespace dinosaurs {
        replication-factor 1
        default-ttl 0
        nsup-period 120

        storage-engine device {
                file /opt/aerospike/data/test-din.dat
                filesize 4G
                read-page-cache true
        }
}